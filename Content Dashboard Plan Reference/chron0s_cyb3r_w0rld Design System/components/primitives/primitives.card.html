<!-- @dsCard group="Components" viewport="700x560" name="Primitives" subtitle="Kicker, Headline, Subline, Chip, ClaimTag, BrandMark, Pagination" -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<link rel="stylesheet" href="../../styles.css" />
<style>
  html, body { margin: 0; background: var(--bg-deep); color: var(--fg); font-family: var(--font-body); }
  .wrap { padding: 30px 34px; display: flex; flex-direction: column; gap: 26px; }
  .row { display: flex; flex-direction: column; gap: 12px; }
  .lbl { font-family: var(--font-mono); font-size: 11px; letter-spacing: 0.18em; text-transform: uppercase; color: var(--muted); }
  .specimens { display: flex; flex-wrap: wrap; gap: 14px 20px; align-items: center; }
  .divider { height: 1px; background: var(--hairline); }
  /* scale the on-canvas type down for the card */
  .mini { --type-kicker: 13px; --type-cta: 13px; --type-meta: 13px; --kicker-rule-w: 26px; }
</style>
</head>
<body>
<div class="wrap mini" id="root"></div>

<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<script src="../../_ds_bundle.js"></script>
<script type="text/babel">
  const { Kicker, Headline, Subline, Chip, ClaimTag, BrandMark, Pagination } = window.Chron0sCyb3rW0rldDesignSystem_0b1a15;

  function Row({ label, children }) {
    return (
      <div className="row">
        <div className="lbl">{label}</div>
        <div className="specimens">{children}</div>
      </div>
    );
  }

  function Demo() {
    return (
      <React.Fragment>
        <Row label="Kicker — mono role label">
          <div className="theme-defensive"><Kicker>Defensive Move</Kicker></div>
          <div className="theme-hacking"><Kicker>Myth vs Reality</Kicker></div>
        </Row>
        <div className="divider" />
        <Row label="Headline — Archivo 800 + emphasis markup">
          <Headline size={30} glow={false}>{"Reading is one thing. Acting is another."}</Headline>
        </Row>
        <div className="theme-ai">
          <Headline size={30} glow={false}>{"The win {{isn't 'AI that thinks.'}} [[It's an agent you own.]]"}</Headline>
        </div>
        <div className="divider" />
        <Row label="Subline — muted clarifier">
          <Subline style={{ fontSize: 16, maxWidth: "100%" }}>Prompt injection isn't always typed by the user.</Subline>
        </Row>
        <div className="divider" />
        <Row label="Chip — pill CTA / swipe cue">
          <div className="theme-defensive"><Chip>Swipe →</Chip></div>
          <div className="theme-defensive"><Chip variant="outline">Save + Follow</Chip></div>
          <div className="theme-offensive"><Chip>Comment + Save</Chip></div>
        </Row>
        <div className="divider" />
        <Row label="ClaimTag — trust-tier badge">
          <div className="theme-defensive" style={{ fontSize: 22 }}><ClaimTag tag="verified" /></div>
          <div style={{ fontSize: 22 }}><ClaimTag tag="emerging" /></div>
          <div style={{ fontSize: 22 }}><ClaimTag tag="scenario" /></div>
        </Row>
        <div className="divider" />
        <Row label="BrandMark + Pagination">
          <BrandMark />
          <div className="theme-hacking"><Pagination current={1} total={8} /></div>
        </Row>
      </React.Fragment>
    );
  }
  ReactDOM.createRoot(document.getElementById("root")).render(<Demo />);
</script>
</body>
</html>
