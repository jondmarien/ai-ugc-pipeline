<!-- @dsCard group="Type" viewport="700x230" name="Display — Archivo" subtitle="The headline voice: condensed-impact, 800 weight, tight leading" -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<link rel="stylesheet" href="../styles.css" />
<style>
  html, body { margin: 0; background: var(--bg-deep); color: var(--fg); font-family: var(--font-body); }
  .wrap { padding: 28px 30px; }
  .tag { font-family: var(--font-mono); font-size: 11px; letter-spacing: 0.16em; text-transform: uppercase; color: var(--muted); margin-bottom: 12px; }
  h1 { font-family: var(--font-headline); font-weight: 800; font-size: 54px; line-height: 1.0; letter-spacing: -0.01em; margin: 0; text-wrap: balance; }
  .specs { font-family: var(--font-mono); font-size: 11px; color: var(--muted); margin-top: 16px; letter-spacing: 0.03em; }
</style>
</head>
<body>
<div class="wrap">
  <div class="tag">Archivo · 800 · cover 104px / headline 76px</div>
  <h1>AI MALWARE IS REAL,<br/>AND MOSTLY OVERHYPED</h1>
  <div class="specs">line-height 1.02 &nbsp;·&nbsp; letter-spacing -0.01em &nbsp;·&nbsp; text-wrap: balance</div>
</div>
</body>
</html>
