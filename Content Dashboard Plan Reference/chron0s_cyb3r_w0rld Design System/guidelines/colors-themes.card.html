<!-- @dsCard group="Colors" viewport="700x340" name="Brand themes" subtitle="One accent per post — category reads at a glance" -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<link rel="stylesheet" href="../styles.css" />
<style>
  html, body { margin: 0; background: var(--bg-deep); color: var(--fg); font-family: var(--font-body); }
  .wrap { padding: 24px 28px; display: flex; flex-direction: column; gap: 12px; }
  .row { display: grid; grid-template-columns: 150px 1fr 1fr; gap: 14px; align-items: center; }
  .label { display: flex; flex-direction: column; gap: 3px; }
  .nm { font-family: var(--font-headline); font-weight: 700; font-size: 16px; }
  .desc { font-family: var(--font-mono); font-size: 10.5px; letter-spacing: 0.04em; color: var(--muted); }
  .acc { height: 46px; border-radius: 11px; display: flex; align-items: flex-end; padding: 8px 11px; }
  .hex { font-family: var(--font-mono); font-size: 11px; color: rgba(2,3,10,0.82); font-weight: 600; }
  .hex.dark { color: rgba(248,250,252,0.92); }
</style>
</head>
<body>
<div class="wrap">
  <div class="row"><div class="label"><span class="nm">Defensive</span><span class="desc">blue-team · model security</span></div><div class="acc" style="background:var(--theme-defensive)"><span class="hex">#3b82f6</span></div><div class="acc" style="background:var(--theme-defensive-2)"><span class="hex">#22d3ee</span></div></div>
  <div class="row"><div class="label"><span class="nm">Offensive</span><span class="desc">red-team · vulnerability</span></div><div class="acc" style="background:var(--theme-offensive)"><span class="hex">#ef4444</span></div><div class="acc" style="background:var(--theme-offensive-2)"><span class="hex">#f43f5e</span></div></div>
  <div class="row"><div class="label"><span class="nm">Hacking</span><span class="desc">underground · myth-busting</span></div><div class="acc" style="background:var(--theme-hacking)"><span class="hex">#39ff88</span></div><div class="acc" style="background:var(--theme-hacking-2)"><span class="hex">#22d3ee</span></div></div>
  <div class="row"><div class="label"><span class="nm">Purple-team</span><span class="desc">offence + defence</span></div><div class="acc" style="background:var(--theme-purple-team)"><span class="hex">#a855f7</span></div><div class="acc" style="background:var(--theme-purple-team-2)"><span class="hex">#c084fc</span></div></div>
  <div class="row"><div class="label"><span class="nm">AI</span><span class="desc">generic · model-centric</span></div><div class="acc" style="background:var(--theme-ai)"><span class="hex">#f97316</span></div><div class="acc" style="background:var(--theme-ai-2)"><span class="hex">#fb923c</span></div></div>
</div>
</body>
</html>
