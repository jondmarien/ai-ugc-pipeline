<!-- @dsCard group="Brand" viewport="700x200" name="Wordmark & handle" subtitle="The leetspeak handle lockup" -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<link rel="stylesheet" href="../styles.css" />
<style>
  html, body { margin: 0; background: var(--bg-deep); color: var(--fg); font-family: var(--font-body); display: flex; min-height: 100vh; }
  .wrap { margin: auto; text-align: center; padding: 26px; }
  .mark { font-family: var(--font-headline); font-weight: 800; font-size: 36px; letter-spacing: -0.01em; }
  .mark .glow { color: var(--theme-defensive); text-shadow: 0 0 40px color-mix(in srgb, var(--theme-defensive) 40%, transparent); }
  .handle { font-family: var(--font-mono); font-size: 14px; letter-spacing: 0.16em; text-transform: uppercase; color: var(--muted); margin-top: 14px; }
  .rule { width: 56px; height: 4px; background: var(--theme-defensive); margin: 18px auto 0; }
</style>
</head>
<body>
<div class="wrap">
  <div class="mark">chron0s <span class="glow">cyb3r</span> w0rld</div>
  <div class="handle">@chron0s_cyb3r_w0rld.ai</div>
  <div class="rule"></div>
</div>
</body>
</html>
