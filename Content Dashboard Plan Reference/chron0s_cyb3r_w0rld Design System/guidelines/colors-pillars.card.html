<!-- @dsCard group="Colors" viewport="700x170" name="Pillar accents" subtitle="The 6-way content-pillar mapping" -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<link rel="stylesheet" href="../styles.css" />
<style>
  html, body { margin: 0; background: var(--bg-deep); color: var(--fg); font-family: var(--font-body); }
  .grid { display: grid; grid-template-columns: repeat(6, 1fr); gap: 10px; padding: 24px 26px; }
  .sw { display: flex; flex-direction: column; gap: 8px; }
  .dot { height: 54px; border-radius: 11px; }
  .nm { font-family: var(--font-mono); font-size: 10px; letter-spacing: 0.03em; color: var(--fg); }
  .hex { font-family: var(--font-mono); font-size: 9.5px; color: var(--muted); }
</style>
</head>
<body>
<div class="grid">
  <div class="sw"><div class="dot" style="background:var(--pillar-offensive-ai)"></div><div class="nm">offensive_ai</div><div class="hex">cyan #22d3ee</div></div>
  <div class="sw"><div class="dot" style="background:var(--pillar-model-security)"></div><div class="nm">model_security</div><div class="hex">blue #3b82f6</div></div>
  <div class="sw"><div class="dot" style="background:var(--pillar-data-leakage)"></div><div class="nm">data_leakage</div><div class="hex">green #39ff88</div></div>
  <div class="sw"><div class="dot" style="background:var(--pillar-defensive-ai)"></div><div class="nm">defensive_ai</div><div class="hex">teal #2dd4bf</div></div>
  <div class="sw"><div class="dot" style="background:var(--pillar-governance)"></div><div class="nm">governance</div><div class="hex">amber #f59e0b</div></div>
  <div class="sw"><div class="dot" style="background:linear-gradient(135deg,var(--danger) 0 50%,var(--pillar-model-security) 50% 100%)"></div><div class="nm">myth_busting</div><div class="hex">red→blue</div></div>
</div>
</body>
</html>
