<!-- @dsCard group="Spacing" viewport="700x300" name="Canvas formats" subtitle="Carousel 4:5 · Reel 9:16 · 96px safe margin" -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<link rel="stylesheet" href="../styles.css" />
<style>
  html, body { margin: 0; background: var(--bg-deep); color: var(--fg); font-family: var(--font-body); }
  .wrap { padding: 24px 30px; display: flex; gap: 34px; align-items: flex-end; justify-content: center; }
  .frame { background: radial-gradient(140% 120% at 50% 0%, var(--bg-raise), var(--bg) 60%, var(--bg-deep)); border: 1px solid var(--hairline); position: relative; border-radius: 6px; }
  .frame::before { content:""; position:absolute; inset:0; height:4px; background:var(--theme-defensive); border-radius:6px 6px 0 0; }
  .safe { position: absolute; inset: 14px; border: 1px dashed rgba(148,163,184,0.4); border-radius: 3px; }
  .car { width: 168px; height: 210px; }
  .reel { width: 130px; height: 231px; }
  .col { display: flex; flex-direction: column; align-items: center; gap: 10px; }
  .lbl { font-family: var(--font-mono); font-size: 11px; color: var(--muted); letter-spacing: 0.05em; }
  .lbl b { color: var(--fg); font-weight: 500; }
</style>
</head>
<body>
<div class="wrap">
  <div class="col">
    <div class="frame car"><div class="safe"></div></div>
    <div class="lbl"><b>Carousel</b> · 1080×1350</div>
  </div>
  <div class="col">
    <div class="frame reel"><div class="safe"></div></div>
    <div class="lbl"><b>Reel</b> · 1080×1920</div>
  </div>
</div>
</body>
</html>
