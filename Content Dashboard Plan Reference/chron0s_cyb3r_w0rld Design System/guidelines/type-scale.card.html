<!-- @dsCard group="Type" viewport="700x300" name="Type scale" subtitle="px @ 1080-wide canvas" -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<link rel="stylesheet" href="../styles.css" />
<style>
  html, body { margin: 0; background: var(--bg-deep); color: var(--fg); font-family: var(--font-body); }
  .wrap { padding: 22px 30px; }
  table { width: 100%; border-collapse: collapse; }
  td { padding: 7px 0; border-bottom: 1px solid var(--hairline); vertical-align: baseline; }
  .tok { font-family: var(--font-mono); font-size: 12px; color: var(--muted); width: 180px; letter-spacing: 0.02em; }
  .px { font-family: var(--font-mono); font-size: 12px; color: var(--theme-defensive); width: 60px; text-align: right; }
  .samp { font-family: var(--font-headline); font-weight: 800; color: var(--fg); line-height: 1; padding-left: 22px; }
  tr:last-child td { border-bottom: none; }
</style>
</head>
<body>
<div class="wrap">
  <table>
    <tr><td class="tok">cover-headline</td><td class="px">104</td><td class="samp" style="font-size:30px">Aa</td></tr>
    <tr><td class="tok">takeaway</td><td class="px">96</td><td class="samp" style="font-size:27px">Aa</td></tr>
    <tr><td class="tok">headline</td><td class="px">76</td><td class="samp" style="font-size:23px">Aa</td></tr>
    <tr><td class="tok">subline</td><td class="px">40</td><td class="samp" style="font-size:16px;font-family:var(--font-body);font-weight:500;color:var(--muted)">Aa</td></tr>
    <tr><td class="tok">body</td><td class="px">36</td><td class="samp" style="font-size:14px;font-family:var(--font-body);font-weight:400">Aa</td></tr>
    <tr><td class="tok">cta · kicker · meta</td><td class="px">34·26·24</td><td class="samp" style="font-size:13px;font-family:var(--font-mono);font-weight:500;letter-spacing:0.14em;color:var(--muted)">AA</td></tr>
  </table>
</div>
</body>
</html>
