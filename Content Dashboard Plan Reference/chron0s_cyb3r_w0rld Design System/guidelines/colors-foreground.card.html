<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<link rel="stylesheet" href="../styles.css" />
<style>
  html, body { margin: 0; background: var(--bg-deep); color: var(--fg); font-family: var(--font-body); }
  .grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 14px; padding: 26px 28px; }
  .sw { border-radius: 14px; border: 1px solid var(--hairline); overflow: hidden; }
  .chip { height: 78px; }
  .meta { padding: 10px 12px; }
  .name { font-family: var(--font-mono); font-size: 12px; letter-spacing: 0.04em; color: var(--fg); }
  .hex { font-family: var(--font-mono); font-size: 11px; color: var(--muted); margin-top: 3px; }
</style>
</head>
<body>
<div class="grid">
  <div class="sw"><div class="chip" style="background:var(--fg)"></div><div class="meta"><div class="name">--fg</div><div class="hex">#f8fafc · primary</div></div></div>
  <div class="sw"><div class="chip" style="background:var(--muted)"></div><div class="meta"><div class="name">--muted</div><div class="hex">#94a3b8 · meta</div></div></div>
  <div class="sw"><div class="chip" style="background:var(--bg); box-shadow: inset 0 0 0 2px var(--hairline)"></div><div class="meta"><div class="name">--hairline</div><div class="hex">slate / 18%</div></div></div>
  <div class="sw"><div class="chip" style="background:var(--danger)"></div><div class="meta"><div class="name">--danger</div><div class="hex">#ef4444 · warn</div></div></div>
</div>
</body>
</html>
