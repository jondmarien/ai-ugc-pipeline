<!-- @dsCard group="Type" viewport="700x180" name="Mono — JetBrains Mono" subtitle="Kickers, handle, pagination, claim tags" -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<link rel="stylesheet" href="../styles.css" />
<style>
  html, body { margin: 0; background: var(--bg-deep); color: var(--fg); font-family: var(--font-body); }
  .wrap { padding: 26px 30px; display: flex; flex-direction: column; gap: 16px; }
  .tag { font-family: var(--font-mono); font-size: 11px; letter-spacing: 0.16em; text-transform: uppercase; color: var(--muted); }
  .specimens { display: flex; align-items: center; gap: 30px; flex-wrap: wrap; }
  .kicker { font-family: var(--font-mono); font-size: 15px; letter-spacing: 0.22em; text-transform: uppercase; color: var(--theme-defensive); display: flex; align-items: center; gap: 12px; }
  .kicker span { width: 30px; height: 3px; background: var(--theme-defensive); }
  .handle { font-family: var(--font-mono); font-size: 14px; letter-spacing: 0.13em; text-transform: uppercase; color: var(--muted); }
  .page { font-family: var(--font-mono); font-size: 14px; letter-spacing: 0.12em; color: var(--theme-defensive); }
</style>
</head>
<body>
<div class="wrap">
  <div class="tag">JetBrains Mono · 500 · uppercase · wide tracking</div>
  <div class="specimens">
    <div class="kicker"><span></span>Defensive Move</div>
    <div class="handle">@CHRON0S_CYB3R_W0RLD.AI</div>
    <div class="page">01/08</div>
  </div>
</div>
</body>
</html>
