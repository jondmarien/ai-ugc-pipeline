<!-- @dsCard group="Brand" viewport="700x480" name="Legibility — the text plate" subtitle="Sharp type over key art: feathered dark plate + 5px backdrop blur" -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<link rel="stylesheet" href="../styles.css" />
<style>
  html, body { margin: 0; background: var(--bg-deep); color: var(--fg); font-family: var(--font-body); }
  .wrap { padding: 22px 26px; display: grid; grid-template-columns: 1fr 1fr; gap: 18px; }
  .frame { position: relative; aspect-ratio: 4/5; border-radius: 12px; overflow: hidden; border: 1px solid var(--hairline); }
  .frame img { position: absolute; inset: 0; width: 100%; height: 100%; object-fit: cover; }
  .copy { position: absolute; left: 18px; right: 18px; bottom: 20px; }
  .plate { position: absolute; inset: -20px -26px; background: var(--overlay-text-plate); backdrop-filter: blur(var(--plate-blur)); -webkit-backdrop-filter: blur(var(--plate-blur)); border-radius: var(--radius-plate); }
  .txt { position: relative; }
  .k { font-family: var(--font-mono); font-size: 10px; letter-spacing: 0.2em; text-transform: uppercase; color: var(--theme-defensive); }
  .h { font-family: var(--font-headline); font-weight: 800; font-size: 21px; line-height: 1.05; margin: 7px 0 0; }
  .tag { position: absolute; top: 12px; left: 14px; font-family: var(--font-mono); font-size: 10px; letter-spacing: 0.1em; text-transform: uppercase; color: var(--fg); text-shadow: 0 1px 6px #000; background: rgba(2,3,10,0.5); padding: 4px 8px; border-radius: 6px; }
</style>
</head>
<body>
<div class="wrap theme-defensive">
  <div class="frame">
    <img src="../assets/backgrounds/blue/06_defense.png" alt="" />
    <div class="tag">No plate</div>
    <div class="copy"><div class="txt"><div class="k">Defensive Move</div><h3 class="h">Isolate untrusted content. Limit tools.</h3></div></div>
  </div>
  <div class="frame">
    <img src="../assets/backgrounds/blue/06_defense.png" alt="" />
    <div class="tag">With plate + blur</div>
    <div class="copy"><div class="plate"></div><div class="txt"><div class="k">Defensive Move</div><h3 class="h">Isolate untrusted content. Limit tools.</h3></div></div>
  </div>
</div>
</body>
</html>
