<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<link rel="stylesheet" href="../styles.css" />
<style>
  html, body { margin: 0; background: var(--bg-deep); color: var(--fg); font-family: var(--font-body); }
  .grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 14px; padding: 26px 28px; }
  .sw { border-radius: 14px; border: 1px solid var(--hairline); overflow: hidden; }
  .chip { height: 78px; }
  .meta { padding: 10px 12px; }
  .name { font-family: var(--font-mono); font-size: 12px; letter-spacing: 0.04em; color: var(--fg); }
  .hex { font-family: var(--font-mono); font-size: 11px; color: var(--muted); margin-top: 3px; }
</style>
</head>
<body>
<div class="grid">
  <div class="sw"><div class="chip" style="background:var(--bg-deep)"></div><div class="meta"><div class="name">--bg-deep</div><div class="hex">#02030a · letterbox</div></div></div>
  <div class="sw"><div class="chip" style="background:var(--bg)"></div><div class="meta"><div class="name">--bg</div><div class="hex">#05070d · canvas</div></div></div>
  <div class="sw"><div class="chip" style="background:var(--bg-raise)"></div><div class="meta"><div class="name">--bg-raise</div><div class="hex">#0a1322 · cover wash</div></div></div>
  <div class="sw"><div class="chip" style="background:var(--panel); backdrop-filter: blur(4px)"></div><div class="meta"><div class="name">--panel</div><div class="hex">rgba(2,6,23,.78)</div></div></div>
</div>
</body>
</html>
