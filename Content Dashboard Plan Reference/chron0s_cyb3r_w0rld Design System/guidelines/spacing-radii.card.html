<!-- @dsCard group="Spacing" viewport="700x170" name="Radii" subtitle="Panel · text plate · pill" -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<link rel="stylesheet" href="../styles.css" />
<style>
  html, body { margin: 0; background: var(--bg-deep); color: var(--fg); font-family: var(--font-body); }
  .wrap { padding: 26px 30px; display: flex; gap: 26px; align-items: center; }
  .item { display: flex; flex-direction: column; gap: 10px; align-items: center; }
  .box { width: 120px; height: 64px; background: var(--panel); border: 1px solid var(--hairline); }
  .pill { width: 150px; height: 46px; background: var(--theme-defensive); border-radius: var(--radius-pill); display:flex; align-items:center; justify-content:center; font-family:var(--font-mono); font-size:12px; letter-spacing:0.16em; color:var(--bg-deep); font-weight:600; }
  .lbl { font-family: var(--font-mono); font-size: 11px; color: var(--muted); }
  .lbl b { color: var(--fg); font-weight: 500; }
</style>
</head>
<body>
<div class="wrap">
  <div class="item"><div class="box" style="border-radius:var(--radius-panel)"></div><div class="lbl"><b>panel</b> · 28px</div></div>
  <div class="item"><div class="box" style="border-radius:var(--radius-plate)"></div><div class="lbl"><b>plate</b> · 44px</div></div>
  <div class="item"><div class="pill">SWIPE →</div><div class="lbl"><b>pill</b> · 999px</div></div>
</div>
</body>
</html>
