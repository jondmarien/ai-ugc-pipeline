<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<link rel="stylesheet" href="../styles.css" />
<style>
  html, body { margin: 0; background: var(--bg-deep); color: var(--fg); font-family: var(--font-body); }
  .wrap { padding: 28px 30px; display: flex; flex-direction: column; gap: 14px; }
  .tag { font-family: var(--font-mono); font-size: 11px; letter-spacing: 0.16em; text-transform: uppercase; color: var(--muted); }
  .sub { font-family: var(--font-body); font-weight: 500; font-size: 26px; line-height: 1.22; color: var(--muted); max-width: 92%; }
  .body { font-family: var(--font-body); font-weight: 400; font-size: 17px; line-height: 1.5; color: var(--fg); max-width: 92%; }
</style>
</head>
<body>
<div class="wrap">
  <div class="tag">Inter · 500 subline · 400 body</div>
  <div class="sub">Reading is one thing. Acting is another.</div>
  <div class="body">Indirect prompt injection lives in the content an agent reads, not the chat box. The danger spikes the moment the agent can act on what it just read.</div>
</div>
</body>
</html>
