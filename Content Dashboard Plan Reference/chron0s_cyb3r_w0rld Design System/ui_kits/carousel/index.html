<!-- @dsCard group="Carousel" viewport="540x880" name="Carousel post" subtitle="The core product: a swipeable 8-slide carousel in a social preview frame" -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Carousel — chron0s_cyb3r_w0rld</title>
<link rel="stylesheet" href="../../styles.css" />
<style>
  html, body { margin: 0; background: var(--bg-deep); color: var(--fg); font-family: var(--font-body);
    min-height: 100vh; display: flex; flex-direction: column; align-items: center; gap: 18px; padding: 26px 16px 48px; box-sizing: border-box; }

  /* Post switcher */
  .switch { display: flex; gap: 6px; padding: 5px; background: var(--bg); border: 1px solid var(--hairline); border-radius: var(--radius-pill); }
  .switch button { font-family: var(--font-mono); font-size: 11px; letter-spacing: 0.12em; text-transform: uppercase;
    color: var(--muted); background: transparent; border: none; padding: 8px 16px; border-radius: var(--radius-pill); cursor: pointer; transition: color .15s; }
  .switch button[data-active="true"] { color: var(--bg-deep); background: var(--accent); font-weight: 600; }

  /* Social preview card */
  .card { width: 472px; max-width: 100%; background: var(--bg); border: 1px solid var(--hairline); border-radius: 18px; overflow: hidden; box-shadow: var(--shadow-panel); }
  .head { display: flex; align-items: center; gap: 11px; padding: 13px 15px; }
  .avatar { width: 38px; height: 38px; border-radius: 50%; flex: 0 0 auto; display: grid; place-items: center;
    background: var(--bg-deep); border: 2px solid var(--accent); font-family: var(--font-mono); font-size: 14px; color: var(--accent); font-weight: 600; }
  .who { display: flex; flex-direction: column; line-height: 1.25; }
  .who .h { font-family: var(--font-mono); font-size: 12.5px; letter-spacing: 0.04em; color: var(--fg); }
  .who .s { font-family: var(--font-mono); font-size: 10px; letter-spacing: 0.1em; text-transform: uppercase; color: var(--muted); }
  .more { margin-left: auto; color: var(--muted); display: flex; gap: 3px; }
  .more i { width: 4px; height: 4px; border-radius: 50%; background: currentColor; }

  /* Stage */
  .stage { position: relative; width: 472px; height: 590px; background: var(--bg-deep); overflow: hidden; }
  .slot { position: absolute; inset: 0; }
  .nav { position: absolute; top: 50%; transform: translateY(-50%); width: 34px; height: 34px; border-radius: 50%;
    background: rgba(2,3,10,0.55); backdrop-filter: blur(4px); border: 1px solid var(--hairline); color: var(--fg);
    display: grid; place-items: center; cursor: pointer; z-index: 4; transition: opacity .15s, background .15s; }
  .nav:hover { background: rgba(2,3,10,0.8); }
  .nav.prev { left: 10px; } .nav.next { right: 10px; }
  .nav[disabled] { opacity: 0; pointer-events: none; }
  .count { position: absolute; top: 12px; right: 12px; z-index: 4; font-family: var(--font-mono); font-size: 11px;
    letter-spacing: 0.08em; color: var(--fg); background: rgba(2,3,10,0.55); padding: 4px 9px; border-radius: var(--radius-pill); backdrop-filter: blur(4px); }

  /* Action bar + caption */
  .actions { display: flex; align-items: center; gap: 18px; padding: 13px 15px 6px; }
  .actions .ic { color: var(--fg); cursor: pointer; display: flex; transition: color .15s, transform .1s; }
  .actions .ic:hover { color: var(--accent); }
  .actions .ic:active { transform: scale(0.88); }
  .actions .ic.liked { color: var(--danger); }
  .actions .save { margin-left: auto; }
  .dots { display: flex; gap: 5px; justify-content: center; padding: 2px 0 8px; }
  .dots i { width: 5px; height: 5px; border-radius: 50%; background: var(--hairline); transition: background .15s, transform .15s; }
  .dots i[data-on="true"] { background: var(--accent); transform: scale(1.25); }
  .likes { padding: 0 15px; font-family: var(--font-mono); font-size: 12px; color: var(--fg); letter-spacing: 0.03em; }
  .cap { padding: 8px 15px 16px; font-size: 13.5px; line-height: 1.5; color: var(--muted); }
  .cap .h { font-family: var(--font-mono); font-size: 12.5px; color: var(--fg); margin-right: 6px; }
  .cap .tags { color: var(--accent); margin-top: 7px; display: block; font-size: 12.5px; }
  .hint { font-family: var(--font-mono); font-size: 10px; letter-spacing: 0.1em; text-transform: uppercase; color: var(--muted); opacity: 0.7; }
</style>
</head>
<body>
<div class="switch" id="switch"></div>
<div id="root"></div>
<div class="hint">← / → or swipe to navigate</div>

<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<script src="../../_ds_bundle.js"></script>
<script src="./data.js"></script>
<script type="text/babel" src="./slides.jsx"></script>
<script type="text/babel">
  const { useState, useEffect, useRef } = React;
  const SCALE = 472 / 1080;
  const THEME_CLASS = { defensive: "theme-defensive", offensive: "theme-offensive", hacking: "theme-hacking", "purple-team": "theme-purple-team", ai: "theme-ai" };

  function Icon({ name }) {
    const p = {
      heart: "M12 21s-7.5-4.6-10-9.3C.6 8.9 2 5.5 5.2 5.5c2 0 3.2 1.2 3.8 2.2.6-1 1.8-2.2 3.8-2.2 3.2 0 4.6 3.4 3.2 6.2C19.5 16.4 12 21 12 21z",
      comment: "M21 11.5a8.4 8.4 0 0 1-12 7.6L3 21l1.9-5.5A8.4 8.4 0 1 1 21 11.5z",
      share: "M22 2 11 13M22 2l-7 20-4-9-9-4 20-7z",
      save: "M6 3h12a1 1 0 0 1 1 1v17l-7-4-7 4V4a1 1 0 0 1 1-1z"
    }[name];
    const fill = name === "save" || name === "heart" ? "currentColor" : "none";
    return (
      <svg width="23" height="23" viewBox="0 0 24 24" fill={name === "comment" || name === "share" ? "none" : fill} stroke="currentColor" strokeWidth="1.7" strokeLinejoin="round" strokeLinecap="round">
        <path d={p} />
      </svg>
    );
  }

  function PostCard({ post }) {
    const KEY = "carousel:" + post.id;
    const [i, setI] = useState(() => Math.min(post.slides.length - 1, parseInt(localStorage.getItem(KEY) || "0", 10) || 0));
    const [liked, setLiked] = useState(false);
    const [saved, setSaved] = useState(false);
    const total = post.slides.length;
    const startX = useRef(null);

    useEffect(() => { localStorage.setItem(KEY, String(i)); }, [i]);
    useEffect(() => {
      const h = (e) => { if (e.key === "ArrowRight") setI((v) => Math.min(total - 1, v + 1)); if (e.key === "ArrowLeft") setI((v) => Math.max(0, v - 1)); };
      window.addEventListener("keydown", h); return () => window.removeEventListener("keydown", h);
    }, [total]);

    const go = (d) => setI((v) => Math.max(0, Math.min(total - 1, v + d)));
    const { CarouselSlide } = window.CarouselRoles;

    return (
      <div className={"card " + THEME_CLASS[post.theme]}>
        <div className="head">
          <div className="avatar">&gt;_</div>
          <div className="who"><span className="h">{post.handle}</span><span className="s">AI × Cybersecurity · {post.posted}</span></div>
          <div className="more"><i></i><i></i><i></i></div>
        </div>

        <div className="stage"
          onTouchStart={(e) => (startX.current = e.touches[0].clientX)}
          onTouchEnd={(e) => { if (startX.current == null) return; const dx = e.changedTouches[0].clientX - startX.current; if (Math.abs(dx) > 40) go(dx < 0 ? 1 : -1); startX.current = null; }}>
          <div className="slot">
            <CarouselSlide post={post} slide={post.slides[i]} index={i} total={total} scale={SCALE} />
          </div>
          <div className="count">{i + 1}/{total}</div>
          <div className="nav prev" disabled={i === 0} onClick={() => go(-1)}>
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.4" strokeLinecap="round" strokeLinejoin="round"><path d="M15 18l-6-6 6-6"/></svg>
          </div>
          <div className="nav next" disabled={i === total - 1} onClick={() => go(1)}>
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.4" strokeLinecap="round" strokeLinejoin="round"><path d="M9 18l6-6-6-6"/></svg>
          </div>
        </div>

        <div className="actions">
          <div className={"ic" + (liked ? " liked" : "")} onClick={() => setLiked((v) => !v)}><Icon name="heart" /></div>
          <div className="ic"><Icon name="comment" /></div>
          <div className="ic"><Icon name="share" /></div>
          <div className="ic save" style={saved ? { color: "var(--accent)" } : null} onClick={() => setSaved((v) => !v)}><Icon name="save" /></div>
        </div>
        <div className="dots">{post.slides.map((_, k) => <i key={k} data-on={k === i} onClick={() => setI(k)} style={{ cursor: "pointer" }} />)}</div>
        <div className="likes">{(post.likes + (liked ? 1 : 0)).toLocaleString()} likes</div>
        <div className="cap">
          <span className="h">{post.handle}</span>{post.caption}
          <span className="tags">{post.hashtags.join("  ")}</span>
        </div>
      </div>
    );
  }

  function App() {
    const [p, setP] = useState(0);
    const posts = window.CAROUSEL_POSTS;
    const sw = document.getElementById("switch");
    // render switcher buttons
    useEffect(() => {}, []);
    return (
      <React.Fragment>
        <Switcher posts={posts} active={p} onPick={setP} />
        <PostCard key={posts[p].id} post={posts[p]} />
      </React.Fragment>
    );
  }

  function Switcher({ posts, active, onPick }) {
    return ReactDOM.createPortal(
      posts.map((po, k) => (
        <button key={po.id} data-active={k === active} className={THEME_CLASS[po.theme]}
          style={k === active ? { background: "var(--accent)" } : null} onClick={() => onPick(k)}>
          {po.theme}
        </button>
      )),
      document.getElementById("switch")
    );
  }

  ReactDOM.createRoot(document.getElementById("root")).render(<App />);
</script>
</body>
</html>
