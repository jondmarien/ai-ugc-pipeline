<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Reel — chron0s_cyb3r_w0rld</title>
<link rel="stylesheet" href="../../styles.css" />
<style>
  html, body { margin: 0; background: var(--bg-deep); color: var(--fg); font-family: var(--font-body);
    min-height: 100vh; display: flex; flex-direction: column; align-items: center; padding: 24px 16px 40px; box-sizing: border-box; }
  #root { width: 100%; display: flex; justify-content: center; }

  .modes { display: flex; gap: 6px; padding: 5px; background: var(--bg); border: 1px solid var(--hairline); border-radius: var(--radius-pill); }
  .modes button { font-family: var(--font-mono); font-size: 11px; letter-spacing: 0.12em; text-transform: uppercase;
    color: var(--muted); background: transparent; border: none; padding: 7px 14px; border-radius: var(--radius-pill); cursor: pointer; }
  .modes button[data-active="true"] { color: var(--bg-deep); background: var(--accent); font-weight: 600; }

  .transport { display: flex; align-items: center; gap: 12px; }
  .play { width: 40px; height: 40px; flex: 0 0 auto; border-radius: 50%; border: 1px solid var(--hairline);
    background: var(--bg); color: var(--fg); display: grid; place-items: center; cursor: pointer; transition: border-color .15s; }
  .play:hover { border-color: var(--accent); color: var(--accent); }
  .track { position: relative; flex: 1; height: 6px; background: var(--bg); border-radius: 999px; cursor: pointer; overflow: hidden; }
  .track .seg { position: absolute; top: 0; height: 100%; box-shadow: inset -1px 0 0 var(--bg-deep); }
  .track .fill { position: absolute; top: 0; left: 0; height: 100%; background: var(--accent); border-radius: 999px; }
  .time { font-family: var(--font-mono); font-size: 11px; color: var(--muted); width: 38px; text-align: right; }
  .hint { font-family: var(--font-mono); font-size: 10px; letter-spacing: 0.1em; text-transform: uppercase; color: var(--muted); opacity: 0.7; margin-top: 16px; }
</style>
</head>
<body>
<div id="root"></div>
<div class="hint">Press play · toggle caption modes above</div>

<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<script src="./data.js"></script>
<script type="text/babel" src="./ReelPlayer.jsx"></script>
<script type="text/babel">
  function App() {
    const { ReelPlayer } = window.ReelKit;
    return (
      <div className="theme-defensive">
        <ReelPlayer reel={window.REEL} scale={0.34} />
      </div>
    );
  }
  ReactDOM.createRoot(document.getElementById("root")).render(<App />);
</script>
</body>
</html>
